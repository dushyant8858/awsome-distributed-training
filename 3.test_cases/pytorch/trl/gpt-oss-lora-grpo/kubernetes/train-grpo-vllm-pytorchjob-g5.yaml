# GRPO training with vLLM server mode using Kubeflow PyTorchJob
# 3 nodes × 4 GPUs = 12 GPUs with DeepSpeed ZeRO-3 + CPU offload
# Uses trl-base:latest (torch 2.9 + vllm 0.12.0 + TRL 0.29.0)
# Scripts mounted from ConfigMap (grpo-scripts)
#
# Each pod runs torchrun --nproc_per_node=4 explicitly.
# PyTorchJob sets MASTER_ADDR/MASTER_PORT for cross-node rendezvous.
#
# Model: pre-merged SFT model at /fsx/models/gpt-oss-20b-sft-merged/ (41.9GB bf16)
# Passed as STRING to GRPOTrainer — DeepSpeed ZeRO-3 handles sharding across 12 GPUs
#
# Prerequisites:
#   1. Merged model at /fsx/models/gpt-oss-20b-sft-merged/
#   2. ConfigMap: kubectl create configmap grpo-scripts \
#        --from-file=grpo_vllm_server.py=artifacts/src/grpo_vllm_server.py \
#        --from-file=ds_config_zero3.json=artifacts/src/configs/ds_config_zero3.json
#   3. vLLM server running (kubectl apply -f vllm-server-g5.yaml)
#   4. Update VLLM_SERVER_HOST below with vLLM pod IP

apiVersion: kubeflow.org/v1
kind: PyTorchJob
metadata:
  name: grpo-vllm-training
spec:
  nprocPerNode: "1"
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: gpt-oss-grpo-vllm-training
        spec:
          nodeSelector:
            node.kubernetes.io/instance-type: ml.g5.12xlarge
          tolerations:
            - key: "sagemaker.amazonaws.com/compute-type"
              operator: "Equal"
              value: "hyperpod"
              effect: "NoSchedule"
          containers:
            - name: pytorch
              image: 975049888767.dkr.ecr.us-west-2.amazonaws.com/trl-base:latest
              imagePullPolicy: Always
              resources:
                requests:
                  nvidia.com/gpu: 4
                  memory: "160Gi"
                  vpc.amazonaws.com/efa: 1
                limits:
                  nvidia.com/gpu: 4
                  memory: "160Gi"
                  vpc.amazonaws.com/efa: 1
              env:
              - name: PYTORCH_CUDA_ALLOC_CONF
                value: "expandable_segments:True,garbage_collection_threshold:0.6"
              - name: NCCL_DEBUG
                value: "WARN"
              - name: NCCL_TIMEOUT
                value: "1800"
              - name: TORCH_NCCL_BLOCKING_WAIT
                value: "1"
              - name: FI_PROVIDER
                value: "efa"
              - name: FI_EFA_USE_DEVICE_RDMA
                value: "0"
              - name: FI_EFA_FORK_SAFE
                value: "1"
              - name: NCCL_PROTO
                value: "simple"
              - name: RDMAV_FORK_SAFE
                value: "1"
              - name: NCCL_NVLS_ENABLE
                value: "0"
              - name: NCCL_NET
                value: "ofi"
              - name: NCCL_SOCKET_IFNAME
                value: "^docker,lo,veth"
              - name: NCCL_BUFFSIZE
                value: "8388608"
              - name: NCCL_P2P_NET_CHUNKSIZE
                value: "2097152"
              - name: NCCL_TUNER_PLUGIN
                value: "/opt/amazon/ofi-nccl/lib/libnccl-ofi-tuner.so"
              - name: LD_LIBRARY_PATH
                value: "/opt/amazon/ofi-nccl/lib/x86_64-linux-gnu:/opt/amazon/efa/lib64:/usr/local/cuda/lib64"
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-token
                    key: token
              - name: HF_HOME
                value: "/fsx/hf_cache"
              - name: CUDA_VISIBLE_DEVICES
                value: "0,1,2,3"
              # vLLM server address — UPDATE THIS with the vLLM pod IP
              - name: VLLM_SERVER_HOST
                value: "10.1.57.81"
              command:
                - bash
                - -c
                - |
                  # Install missing deps (only rank 0 node installs, others use shared fs cache)
                  pip install -q langdetect peft 2>/dev/null

                  # torchrun handles LOCAL_RANK, RANK, WORLD_SIZE, MASTER_ADDR, MASTER_PORT
                  # PyTorchJob sets MASTER_ADDR and MASTER_PORT; we pass them through
                  exec torchrun \
                    --nproc_per_node=4 \
                    --nnodes=3 \
                    --node_rank=${PET_NODE_RANK:-0} \
                    --master_addr=${MASTER_ADDR} \
                    --master_port=${MASTER_PORT} \
                    /scripts/grpo_vllm_server.py \
                    --model_name_or_path /fsx/models/gpt-oss-20b-sft-merged \
                    --vllm_server_host ${VLLM_SERVER_HOST} \
                    --vllm_server_port 8000 \
                    --output_dir /fsx/checkpoints/grpo-vllm \
                    --deepspeed /scripts/ds_config_zero3.json \
                    --num_generations 4 \
                    --num_epochs 10 \
                    --learning_rate 1e-6 \
                    --per_device_train_batch_size 1 \
                    --gradient_accumulation_steps 2 \
                    --max_completion_length 256 \
                    --eval_size 20
              volumeMounts:
                - name: shmem
                  mountPath: /dev/shm
                - name: fsx-storage
                  mountPath: /fsx
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: shmem
              emptyDir:
                medium: Memory
                sizeLimit: 64Gi
            - name: fsx-storage
              persistentVolumeClaim:
                claimName: fsx-claim
            - name: scripts
              configMap:
                name: grpo-scripts
    Worker:
      replicas: 2
      restartPolicy: OnFailure
      template:
        metadata:
          labels:
            app: gpt-oss-grpo-vllm-training
        spec:
          nodeSelector:
            node.kubernetes.io/instance-type: ml.g5.12xlarge
          tolerations:
            - key: "sagemaker.amazonaws.com/compute-type"
              operator: "Equal"
              value: "hyperpod"
              effect: "NoSchedule"
          containers:
            - name: pytorch
              image: 975049888767.dkr.ecr.us-west-2.amazonaws.com/trl-base:latest
              imagePullPolicy: Always
              resources:
                requests:
                  nvidia.com/gpu: 4
                  memory: "160Gi"
                  vpc.amazonaws.com/efa: 1
                limits:
                  nvidia.com/gpu: 4
                  memory: "160Gi"
                  vpc.amazonaws.com/efa: 1
              env:
              - name: PYTORCH_CUDA_ALLOC_CONF
                value: "expandable_segments:True,garbage_collection_threshold:0.6"
              - name: NCCL_DEBUG
                value: "WARN"
              - name: NCCL_TIMEOUT
                value: "1800"
              - name: TORCH_NCCL_BLOCKING_WAIT
                value: "1"
              - name: FI_PROVIDER
                value: "efa"
              - name: FI_EFA_USE_DEVICE_RDMA
                value: "0"
              - name: FI_EFA_FORK_SAFE
                value: "1"
              - name: NCCL_PROTO
                value: "simple"
              - name: RDMAV_FORK_SAFE
                value: "1"
              - name: NCCL_NVLS_ENABLE
                value: "0"
              - name: NCCL_NET
                value: "ofi"
              - name: NCCL_SOCKET_IFNAME
                value: "^docker,lo,veth"
              - name: NCCL_BUFFSIZE
                value: "8388608"
              - name: NCCL_P2P_NET_CHUNKSIZE
                value: "2097152"
              - name: NCCL_TUNER_PLUGIN
                value: "/opt/amazon/ofi-nccl/lib/libnccl-ofi-tuner.so"
              - name: LD_LIBRARY_PATH
                value: "/opt/amazon/ofi-nccl/lib/x86_64-linux-gnu:/opt/amazon/efa/lib64:/usr/local/cuda/lib64"
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-token
                    key: token
              - name: HF_HOME
                value: "/fsx/hf_cache"
              - name: CUDA_VISIBLE_DEVICES
                value: "0,1,2,3"
              - name: VLLM_SERVER_HOST
                value: "10.1.57.81"
              command:
                - bash
                - -c
                - |
                  # Install missing deps
                  pip install -q langdetect peft 2>/dev/null

                  exec torchrun \
                    --nproc_per_node=4 \
                    --nnodes=3 \
                    --node_rank=${PET_NODE_RANK:-0} \
                    --master_addr=${MASTER_ADDR} \
                    --master_port=${MASTER_PORT} \
                    /scripts/grpo_vllm_server.py \
                    --model_name_or_path /fsx/models/gpt-oss-20b-sft-merged \
                    --vllm_server_host ${VLLM_SERVER_HOST} \
                    --vllm_server_port 8000 \
                    --output_dir /fsx/checkpoints/grpo-vllm \
                    --deepspeed /scripts/ds_config_zero3.json \
                    --num_generations 4 \
                    --num_epochs 10 \
                    --learning_rate 1e-6 \
                    --per_device_train_batch_size 1 \
                    --gradient_accumulation_steps 2 \
                    --max_completion_length 256 \
                    --eval_size 20
              volumeMounts:
                - name: shmem
                  mountPath: /dev/shm
                - name: fsx-storage
                  mountPath: /fsx
                - name: scripts
                  mountPath: /scripts
          volumes:
            - name: shmem
              emptyDir:
                medium: Memory
                sizeLimit: 64Gi
            - name: fsx-storage
              persistentVolumeClaim:
                claimName: fsx-claim
            - name: scripts
              configMap:
                name: grpo-scripts
