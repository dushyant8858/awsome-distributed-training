name: eks-cluster-manager
version: 2.0.0
description: |
  Create, validate, and manage EKS clusters and supporting infrastructure
  (VPC, subnets, security groups, VPC endpoints, IAM roles, S3) for
  HyperPod distributed training workloads. Uses direct boto3 API calls
  with security guardrails enforced by default.

triggers:
  - type: command
    pattern: "/manage-eks-cluster"
    description: "Provision or validate EKS cluster infrastructure"

parameters:
  - name: name_prefix
    type: string
    default: "sagemaker-hyperpod"
    description: "Prefix for all resource names and tags"

  - name: eks_cluster_name
    type: string
    default: ""
    description: "EKS cluster name (defaults to {name_prefix}-eks)"

  - name: region
    type: string
    default: "us-west-2"
    description: "AWS region"

  - name: kubernetes_version
    type: string
    default: "1.32"
    description: "Kubernetes version"

  - name: availability_zone_id
    type: string
    default: ""
    description: "AZ ID for private HyperPod subnet (e.g., usw2-az2). Auto-detected if empty."

  - name: vpc_cidr
    type: string
    default: "10.192.0.0/16"
    description: "Primary VPC CIDR block"

  - name: private_subnet_cidr
    type: string
    default: "10.1.0.0/16"
    description: "Secondary CIDR for HyperPod private subnet"

  - name: action
    type: string
    default: "provision"
    description: "Action: provision, validate, create_access_entry"

outputs:
  - name: vpc
    type: object
    description: "VPC details (vpc_id, subnet_ids, etc.)"

  - name: security_group_id
    type: string
    description: "Training security group ID"

  - name: eks_cluster
    type: object
    description: "EKS cluster details (name, arn, endpoint, status)"

  - name: sagemaker_execution_role_arn
    type: string
    description: "SageMaker execution role ARN (needed for HyperPod)"

  - name: s3_bucket
    type: string
    description: "S3 bucket name for lifecycle scripts"

  - name: validation_report
    type: object
    description: "Cluster validation results"

dependencies:
  - aws-cli
  - kubectl
  - python3
  - boto3

examples:
  - command: "/manage-eks-cluster"
    description: "Provision complete EKS infrastructure with defaults"

  - command: "/manage-eks-cluster --name_prefix my-training --availability_zone_id usw2-az2"
    description: "Provision with custom prefix and pinned AZ"

  - command: "/manage-eks-cluster --action validate --eks_cluster_name my-cluster"
    description: "Validate existing cluster readiness"

author: opencode
license: MIT
